<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramesh Kumar K | Automation Engineer</title>

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(0,0,0,0.7);
    position: sticky;
    top: 0;
}

.nav-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.nav-circle {
    background: white;
    color: #1e3a8a;
    padding: 10px;
    border-radius: 50%;
    font-weight: bold;
}

.profile-text {
    color: #38bdf8;
    font-weight: 600;
}

.nav-links a {
    color: #38bdf8;
    margin-left: 15px;
    text-decoration: none;
    transition: 0.3s;
}

.nav-links a:hover {
    color: white;
}

/* HERO */
header {
    text-align: center;
    padding: 60px 20px;
}

#typing {
    font-size: 2.2rem;
    margin: 15px 0;
}

/* BANNER */
.banner {
    min-height: 300px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 40px 60px;
    background: radial-gradient(circle at right,#0d2c5a,#022b1a);
    position: relative;
    overflow: hidden;
}

.banner:before {
    content: "";
    position: absolute;
    width: 400%;
    height: 200%;
    background: repeating-linear-gradient(0deg,rgba(0,255,255,.05)0 1px,transparent 1px 40px);
    animation: move 30s linear infinite;
}

@keyframes move {
    to { transform: translateY(-200px); }
}

.banner-content {
    z-index: 2;
    max-width: 600px;
}

.banner-content h1 {
    font-size: 40px;
    margin: 0 0 10px;
}

.banner-content h2 {
    font-size: 20px;
    color: #00e5ff;
    margin: 0 0 10px;
}

.banner-content p {
    font-size: 14px;
}

.hud {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 2px solid #00e5ff;
    box-shadow: 0 0 20px #00e5ff;
    animation: spin 10s linear infinite;
    position: relative;
    z-index: 2;
}

.hud:before {
    content: "";
    position: absolute;
    inset: 20px;
    border: 2px dashed #00e5ff;
    border-radius: 50%;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* DIAGRAM */
.diagram {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 30px auto;
}

.circle {
    width: 100%;
    height: 100%;
    border: 3px dotted #aaa;
    border-radius: 50%;
}

.center-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.step {
    position: absolute;
    background: #1e7f3f;
    padding: 8px 12px;
    border-radius: 20px;
    font-size: 12px;
}

.selenium { top: -10px; left: 50%; transform: translateX(-50%); }
.testng { top: 60px; right: -30px; }
.manual { bottom: 80px; right: -30px; }
.testing { bottom: 80px; left: -30px; }
.deployment { top: 60px; left: -30px; }
.building { bottom: -10px; left: 50%; transform: translateX(-50%); }

/* BUTTONS */
.btn, .btn-linkedin {
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    margin: 10px;
    display: inline-block;
}

.btn {
    background: #38bdf8;
    color: black;
}

.btn:hover {
    background: white;
}

.btn-linkedin {
    background: #38bdf8;
    color: black;
}

.btn-linkedin:hover {
    background: #004182;
    color: white;
}

/* SECTIONS */
section {
    padding: 50px 20px;
    max-width: 1000px;
    margin: auto;
    text-align: center;
}

.flex {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 20px;
    border-radius: 10px;
    width: 220px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: rgba(0,0,0,0.5);
}

/* MOBILE */
@media (max-width: 600px) {

    nav {
        flex-direction: column;
        gap: 10px;
    }

    .banner {
        flex-direction: column;
        text-align: center;
        padding: 20px;
    }

    .hud {
        margin-top: 20px;
    }

    .diagram {
        width: 220px;
        height: 220px;
    }

    .step {
        font-size: 10px;
        padding: 5px 8px;
    }
}

</style>
</head>

<body>

<nav>
    <div class="nav-left">
        <div class="nav-circle">RK</div>
        <div class="profile-text">Software Automation Engineer</div>
    </div>

    <div class="nav-links">
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<header>

<section class="banner">
  <div class="banner-content">
    <h1>RAMESH KUMAR K</h1>
    <h2>SOFTWARE AUTOMATION ENGINEER</h2>
    <p>4.7+ Years | Quality Driven | Automation Enthusiast</p>
    <p>Java | Python | Selenium | TestNG | STLC | API | CI/CD</p>
  </div>
  <div class="hud"></div>
</section>

</header>

<footer>
© 2026 Ramesh Kumar K
</footer>

<script>
const text = "Hi, I'm Ramesh Kumar ";
let i = 0;

function typing() {
    if (i < text.length) {
        document.getElementById("typing").textContent += text.charAt(i);
        i++;
        setTimeout(typing, 100);
    }
}

typing();
</script>

</body>
</html>
